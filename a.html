<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クリックで動くシューティングゲーム</title>
    <style>
        body {
            margin: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #fff;
            background: #000;
            max-width: 100%;
        }
        .info {
            margin-top: 10px;
            text-align: center;
        }
        /* 画面下の操作ボタン */
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 15px;
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #444;
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
        }
        .btn:active {
            background: #222;
        }
        #shootBtn {
            background: #ff4500;
        }
        #shootBtn:active {
            background: #b33000;
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="400" height="450"></canvas>
    
    <div class="info">
        <span id="scoreLabel" style="font-size: 20px; font-weight: bold;">Score: 0</span>
    </div>

    <div class="controls">
        <button class="btn" id="leftBtn">← 左</button>
        <button class="btn" id="shootBtn">弾発射</button>
        <button class="btn" id="rightBtn">右 →</button>
    </div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreLabel = document.getElementById("scoreLabel");

let score = 0;
let gameOver = false;

// プレイヤー（自機）
const player = {
    x: canvas.width / 2 - 15,
    y: canvas.height - 40,
    width: 30,
    height: 20,
    speed: 6,
    color: "#00ff00"
};

// ボタンの入力状態
const keys = { Left: false, Right: false };
let bullets = [];
let enemies = [];

// --- ボタンのイベント登録（PC・スマホ両対応） ---
const leftBtn = document.getElementById("leftBtn");
const rightBtn = document.getElementById("rightBtn");
const shootBtn = document.getElementById("shootBtn");

// 左ボタン
leftBtn.addEventListener("mousedown", () => keys.Left = true);
leftBtn.addEventListener("mouseup", () => keys.Left = false);
leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.Left = true; });
leftBtn.addEventListener("touchend", () => keys.Left = false);

// 右ボタン
rightBtn.addEventListener("mousedown", () => keys.Right = true);
rightBtn.addEventListener("mouseup", () => keys.Right = false);
rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); keys.Right = true; });
rightBtn.addEventListener("touchend", () => keys.Right = false);

// 発射ボタン
function fireBullet() {
    if (!gameOver) {
        bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 10, speed: 8 });
    } else {
        // ゲームオーバー時は画面クリック等でリトライ
        resetGame();
    }
}
shootBtn.addEventListener("mousedown", fireBullet);
shootBtn.addEventListener("touchstart", (e) => { e.preventDefault(); fireBullet(); });

// 敵の自動生成ループ
let spawnTimer;
function spawnEnemy() {
    if (gameOver) return;
    const size = 20;
    const x = Math.random() * (canvas.width - size);
    enemies.push({ x: x, y: -size, width: size, height: size, speed: 2 + Math.random() * 2 });
    
    // 次の敵の出現時間を決める
    spawnTimer = setTimeout(spawnEnemy, 600 + Math.random() * 800);
}

// 当たり判定
function isColliding(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// リセット処理
function resetGame() {
    score = 0;
    gameOver = false;
    bullets = [];
    enemies = [];
    player.x = canvas.width / 2 - 15;
    scoreLabel.textContent = "Score: " + score;
    clearTimeout(spawnTimer);
    spawnEnemy();
    gameLoop();
}

// メインループ
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (!gameOver) {
        // 移動処理
        if (keys.Left && player.x > 0) player.x -= player.speed;
        if (keys.Right && player.x < canvas.width - player.width) player.x += player.speed;

        // 弾の移動・描画
        bullets.forEach((bullet, bIndex) => {
            bullet.y -= bullet.speed;
            if (bullet.y < 0) bullets.splice(bIndex, 1);
            ctx.fillStyle = "#ffff00";
            ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height);
        });

        // 敵の移動・描画・判定
        enemies.forEach((enemy, eIndex) => {
            enemy.y += enemy.speed;

            if (enemy.y > canvas.height || isColliding(player, enemy)) {
                gameOver = true;
            }

            bullets.forEach((bullet, bIndex) => {
                if (isColliding(bullet, enemy)) {
                    enemies.splice(eIndex, 1);
                    bullets.splice(bIndex, 1);
                    score += 100;
                    scoreLabel.textContent = "Score: " + score;
                }
            });

            ctx.fillStyle = "#ff0000";
            ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        });

        // 自機の描画
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);

        requestAnimationFrame(gameLoop);
    } else {
        // ゲームオーバー画面
        ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#ff0000";
        ctx.font = "30px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 10);
        
        ctx.fillStyle = "#fff";
        ctx.font = "16px sans-serif";
        ctx.fillText("「弾発射」ボタンを押してリトライ", canvas.width / 2, canvas.height / 2 + 30);
    }
}

// 初回スタート
spawnEnemy();
gameLoop();
</script>

</body>
</html>
